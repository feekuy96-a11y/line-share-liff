<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบแชร์การ์ดใบลา (LINE LIFF)</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { 
      background: #0f172a; 
      color: white; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      padding: 20px; 
      text-align: center; 
      box-sizing: border-box;
    }
    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      border: 1px solid #334155;
      max-width: 350px;
      width: 100%;
    }
    .loader { 
      border: 4px solid rgba(255,255,255,0.1); 
      border-left-color: #10b981; 
      border-radius: 50%; 
      width: 45px; 
      height: 45px; 
      animation: spin 1s linear infinite; 
      margin: 0 auto 20px auto; 
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #status {
      font-size: 16px;
      color: #cbd5e1;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="loader" id="loader"></div>
    <div id="status">กำลังเริ่มต้นเชื่อมต่อเซิร์ฟเวอร์ LINE...</div>
  </div>

  <script>
    // 📌 ข้อมูลคอนฟิกูเรชันระบบแชร์ของคุณ
    const LIFF_ID = "2008126991-vMM9VdAj"; 
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwvNt6tcFBBjhgaUOUCSoHjourVj4akKxXFHQgBatfRM5bRF_Z9vKMJEwCfCsVPj78w/exec";

    async function main() {
      try {
        // 1. เริ่มต้นระบบ LIFF
        await liff.init({ liffId: LIFF_ID });
        
        // 2. ตรวจสอบและบังคับล็อกอิน (กรณีเปิดผ่าน External Browser)
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        // 3. แกะรหัสใบลา (leaveId) จาก URL
        const urlParams = new URLSearchParams(window.location.search);
        let leaveId = urlParams.get('leaveId');
        
        // ดักจับกรณีที่ LINE แอบซ่อนพารามิเตอร์ไว้ใน liff.state หลังจากเปลี่ยนหน้าเข้าแอป
        if (!leaveId && urlParams.get('liff.state')) {
           const stateParams = new URLSearchParams(urlParams.get('liff.state').substring(1));
           leaveId = stateParams.get('leaveId') || stateParams.get('?leaveId');
        }

        if (!leaveId) {
          showError("ไม่พบรหัสใบลา (leaveId) ในลิงก์ กรุณาตรวจสอบอีกครั้ง");
          return;
        }

        document.getElementById('status').innerText = "กำลังดึงข้อมูลใบลาจากระบบ...";

        // 4. ยิง Fetch API ไปเรียกข้อมูลพนักงานจากหลังบ้าน Google Apps Script
        const response = await fetch(`${GAS_API_URL}?action=api_get_leave&leaveId=${leaveId}`);
        const result = await response.json();
        
        if (result.status === "success" && result.data) {
          shareFlex(result.data);
        } else {
          showError(result.message || "เกิดข้อผิดพลาด: ไม่สามารถดึงข้อมูลใบลาได้");
        }

      } catch (err) {
        showError("เชื่อมต่อฐานข้อมูลล้มเหลว หรือเกิดข้อผิดพลาดในการรันระบบ");
        console.error(err);
      }
    }

    // 5. ประกอบโครงสร้าง Flex Message และเรียกหน้าต่าง Share Target Picker
    async function shareFlex(data) {
      document.getElementById('status').innerText = "กำลังเปิดหน้าต่างเลือกแชทเพื่อส่งต่อ...";
      
      // ตั้งค่าสีธีมตามสถานะใบลา
      let hc = data.status === 'อนุมัติ' ? "#10b981" : (data.status === 'ไม่อนุมัติ' ? "#ef4444" : (data.status === 'ยกเลิกแล้ว' ? "#64748b" : "#f59e0b"));
      let eventName = data.status === "รอพิจารณา" ? "ยื่นคำร้อง" : (data.status === "ยกเลิกแล้ว" ? "ยกเลิกคำร้อง" : "แจ้งผลการพิจารณา");
      
      let bodyContents = [
        { type: "text", text: "รายละเอียดการดำเนินการ", weight: "bold", size: "md", color: "#111827" },
        { type: "separator", color: "#e5e7eb", margin: "md" },
        { type: "box", layout: "vertical", spacing: "sm", margin: "md", contents: [
            { type: "box", layout: "baseline", contents: [{ type: "text", text: "ผู้ขอลา", color: "#6b7280", size: "sm", flex: 2 }, { type: "text", text: String(data.empName || "-"), weight: "bold", color: "#1f2937", size: "sm", flex: 5, wrap: true }] },
            { type: "box", layout: "baseline", contents: [{ type: "text", text: "ประเภท", color: "#6b7280", size: "sm", flex: 2 }, { type: "text", text: String(data.type || "-"), weight: "bold", color: "#1f2937", size: "sm", flex: 5, wrap: true }] },
            { type: "box", layout: "baseline", contents: [{ type: "text", text: "วันที่", color: "#6b7280", size: "sm", flex: 2 }, { type: "text", text: `${data.start} - ${data.end}\n(${data.days || 0} วัน)`, weight: "bold", color: "#1f2937", size: "sm", flex: 5, wrap: true }] },
            { type: "box", layout: "baseline", contents: [{ type: "text", text: "เหตุผล", color: "#6b7280", size: "sm", flex: 2 }, { type: "text", text: String(data.reason || "-"), color: "#1f2937", size: "sm", flex: 5, wrap: true }] }
        ]}
      ];

      // หากมีเหตุผลการไม่อนุมัติ ให้เพิ่มเข้าไปในการ์ดแชร์
      if (data.status === 'ไม่อนุมัติ' && data.rejectReason) {
        bodyContents[2].contents.push({
          type: "box", layout: "baseline", margin: "sm", contents: [
            { type: "text", text: "หมายเหตุ", color: "#ef4444", size: "sm", flex: 2, weight: "bold" },
            { type: "text", text: String(data.rejectReason), size: "sm", flex: 5, wrap: true, color: "#ef4444", weight: "bold" }
          ]
        });
      }

      const flexMsg = {
        type: "flex", 
        altText: `[${eventName}] สรุปการลางาน: ${data.empName} (${data.status})`,
        contents: {
          type: "bubble", size: "mega",
          header: { type: "box", layout: "vertical", backgroundColor: hc, contents: [{ type: "text", text: eventName, color: "#ffffff", size: "xs", weight: "bold" }, { type: "text", text: data.status, weight: "bold", color: "#ffffff", size: "xl", margin: "sm" }] },
          body: { type: "box", layout: "vertical", contents: bodyContents },
          footer: { type: "box", layout: "vertical", spacing: "sm", contents: [{ type: "button", style: "primary", color: "#0f172a", height: "sm", action: { type: "uri", label: "เข้าสู่ระบบเพื่อตรวจสอบ", uri: data.appUrl || GAS_API_URL } }] }
        }
      };

      // 6. ส่งคำสั่งเรียก Share Target Picker ของแอป LINE
      if (liff.isApiAvailable("shareTargetPicker")) {
        try {
          const res = await liff.shareTargetPicker([flexMsg]);
          if (res) {
             document.getElementById('status').innerText = "🚀 แชร์ข้อมูลสำเร็จเรียบร้อยแล้ว!";
             document.getElementById('status').style.color = "#10b981";
          } else {
             document.getElementById('status').innerText = "คุณได้ยกเลิกการแชร์ข้อความ";
             document.getElementById('status').style.color = "#94a3b8";
          }
          document.getElementById('loader').style.display = 'none';
          setTimeout(() => liff.closeWindow(), 1800);
        } catch (err) { 
          showError("เกิดข้อผิดพลาดขณะส่งข้อความแชร์: " + err); 
        }
      } else {
        showError("ฟังก์ชันแชร์ไม่พร้อมใช้งานบนหน้าจอนี้ (โปรดเปิดใช้งานผ่านสมาร์ตโฟน)");
      }
    }

    function showError(msg) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('status').innerText = msg;
      document.getElementById('status').style.color = '#ef4444';
    }

    // เริ่มรันระบบ
    main();
  </script>
</body>
</html>
