<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบแชร์</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { 
      background: #0f172a; 
      color: white; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      padding: 20px; 
      text-align: center; 
      box-sizing: border-box;
    }
    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      border: 1px solid #334155;
      max-width: 350px;
      width: 100%;
    }
    .progress-container {
      width: 100%;
      height: 8px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin-bottom: 10px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      background-color: #10b981;
      width: 0%; 
      border-radius: 4px;
      transition: width 0.3s ease-out; 
    }
    .percent {
      font-size: 24px;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 20px;
    }
    #status {
      font-size: 16px;
      color: #cbd5e1;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="percent" id="percent">0%</div>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div id="status">กำลังเริ่มต้นเชื่อมต่อเซิร์ฟเวอร์ LINE...</div>
  </div>

  <script>
    const LIFF_ID = "2008126991-vMM9VdAj"; 
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwb9aH9_gOdLEQYuLLWAnM_Zt4YfVIyfLCjjXpwyoULWHu_s0h9muQM04AGj2Jccy9-/exec";

    const progressBar = document.getElementById('progress-bar');
    const percentText = document.getElementById('percent');
    const statusText = document.getElementById('status');

    let progressInterval;
    let currentPercent = 0;

    function startProgressSimulation() {
      clearInterval(progressInterval); 
      currentPercent = 0;
      percentText.innerText = "0%";
      progressBar.style.width = "0%";

      progressInterval = setInterval(() => {
        if (currentPercent < 95) { 
          currentPercent += (Math.random() * 2) + 1; 
          if (currentPercent > 95) currentPercent = 95; 
          percentText.innerText = `${Math.floor(currentPercent)}%`;
          progressBar.style.width = `${currentPercent}%`;
        }
      }, 200); 
    }

    function finishProgress(isSuccess) {
      clearInterval(progressInterval); 
      if (isSuccess) {
        percentText.innerText = "100%";
        progressBar.style.width = "100%";
        percentText.style.color = "#10b981"; 
      } else {
        percentText.style.color = "#ef4444"; 
      }
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        let leaveId = urlParams.get('leaveId');
        
        if (!leaveId && urlParams.get('liff.state')) {
           const stateParams = new URLSearchParams(urlParams.get('liff.state').substring(1));
           leaveId = stateParams.get('leaveId') || stateParams.get('?leaveId');
        }

        if (!leaveId) {
          finishProgress(false); 
          showError("ไม่พบรหัสใบลา (leaveId) ในลิงก์ กรุณาตรวจสอบอีกครั้ง");
          return;
        }

        statusText.innerText = "กำลังประมวลผลคำขอ...";
        startProgressSimulation();
        statusText.innerText = "กำลังดึงข้อมูลใบลาจากระบบ...";

        const response = await fetch(`${GAS_API_URL}?action=api_get_leave&leaveId=${leaveId}`);
        const result = await response.json();
        
        if (result.status === "success" && result.data) {
          finishProgress(true);
          shareFlex(result.data);
        } else {
          finishProgress(false); 
          showError(result.message || "เกิดข้อผิดพลาด: ไม่สามารถดึงข้อมูลใบลาได้");
        }

      } catch (err) {
        finishProgress(false); 
        showError("เชื่อมต่อฐานข้อมูลล้มเหลว หรือเกิดข้อผิดพลาดในการรันระบบ");
      }
    }

    async function shareFlex(data) {
      statusText.innerText = "กำลังเปิดหน้าต่างเลือกแชทเพื่อส่งต่อ...";
      
      let hc = data.status === 'อนุมัติ' ? "#10b981" : (data.status === 'ไม่อนุมัติ' ? "#ef4444" : (data.status === 'ยกเลิกแล้ว' ? "#64748b" : "#f59e0b"));
      let eventName = data.status === "รอพิจารณา" ? "ยื่นคำร้อง" : (data.status === "ยกเลิกแล้ว" ? "ยกเลิกคำร้อง" : "แจ้งผลการพิจารณา");
      
      // 🌟 อัปเดต 4: จัดโครงสร้างการ์ดเหมือนระบบหลักเป๊ะๆ (เล่นสีสถิติและเวลา)
      let statPast = data.statPast || 0;
      let statReq = data.days || 0;
      let statTotal = statPast + statReq;
      let statRemain = data.statRemain || 0;

      const formatThaiTime = (ts) => {
        let d = ts ? new Date(ts.replace(" ", "T")) : new Date(); if(isNaN(d)) d = new Date();
        const tM = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
        return `${d.getDate()} ${tM[d.getMonth()]} ${d.getFullYear()+543} เวลา ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} น.`;
      };

      let timeFooterText = "";
      if (data.status === "รอพิจารณา") timeFooterText = `ยื่นคำขอเมื่อ: ${formatThaiTime(data.actionTime)}`;
      else if (data.status === "อนุมัติ") timeFooterText = `อนุมัติคำขอเมื่อ: ${formatThaiTime(data.actionTime)}`;
      else if (data.status === "ไม่อนุมัติ") timeFooterText = `ไม่อนุมัติคำขอเมื่อ: ${formatThaiTime(data.actionTime)}`;
      else timeFooterText = `อัปเดตสถานะเมื่อ: ${formatThaiTime(data.actionTime)}`;

      let bodyContents = [
        { type: "text", text: "รายละเอียดการดำเนินการ", weight: "bold", size: "md", color: "#111827" },
        { type: "separator", color: "#e5e7eb", margin: "md" },
        { type: "box", layout: "vertical", spacing: "sm", margin: "md", contents: [
            { type: "box", layout: "baseline", contents: [{ type: "text", text: "ผู้ขอลา", color: "#6b7280", size: "sm", flex: 2 }, { type: "text", text: String(data.empName || "-"), weight: "bold", color: "#1f2937", size: "sm", flex: 5, wrap: true }] },
            { type: "box", layout: "baseline", contents: [{ type: "text", text: "ประเภท", color: "#6b7280", size: "sm", flex: 2 }, { type: "text", text: String(data.type || "-"), weight: "bold", color: "#1f2937", size: "sm", flex: 5, wrap: true }] },
            { type: "box", layout: "baseline", contents: [{ type: "text", text: "วันที่", color: "#6b7280", size: "sm", flex: 2 }, { type: "text", text: `${data.start} - ${data.end}\n(${data.days || 0} วัน)`, weight: "bold", color: "#1f2937", size: "sm", flex: 5, wrap: true }] },
            { type: "box", layout: "baseline", contents: [{ type: "text", text: "เหตุผล", color: "#6b7280", size: "sm", flex: 2 }, { type: "text", text: String(data.reason || "-"), color: "#1f2937", size: "sm", flex: 5, wrap: true }] }
        ]}
      ];

      if (data.status === 'ไม่อนุมัติ' && data.rejectReason) {
        bodyContents[2].contents.push({
          type: "box", layout: "baseline", margin: "sm", contents: [
            { type: "text", text: "หมายเหตุ", color: "#ef4444", size: "sm", flex: 2, weight: "bold" },
            { type: "text", text: String(data.rejectReason), size: "sm", flex: 5, wrap: true, color: "#ef4444", weight: "bold" }
          ]
        });
      }

      bodyContents.push({ type: "separator", color: "#e5e7eb", margin: "lg" });
      bodyContents.push({ type: "text", text: "📊 สถิติการลา (ปีงบประมาณนี้)", weight: "bold", size: "xs", color: "#3b82f6", margin: "md" });
      bodyContents.push({
          type: "box", layout: "vertical", spacing: "xs", margin: "sm", contents: [
            { type: "box", layout: "horizontal", contents: [{ type: "text", text: "ลามาแล้ว", size: "xs", color: "#64748b", flex: 2 }, { type: "text", text: `${statPast} วัน`, size: "xs", color: "#64748b", align: "end", flex: 1, weight: "bold" }]},
            { type: "box", layout: "horizontal", contents: [{ type: "text", text: "ลาครั้งนี้", size: "xs", color: "#64748b", flex: 2 }, { type: "text", text: `${statReq} วัน`, size: "xs", color: "#3b82f6", align: "end", flex: 1, weight: "bold" }]},
            { type: "box", layout: "horizontal", contents: [{ type: "text", text: "รวมเป็น", size: "xs", color: "#64748b", flex: 2 }, { type: "text", text: `${statTotal} วัน`, size: "xs", color: "#f59e0b", align: "end", flex: 1, weight: "bold" }]},
            { type: "box", layout: "horizontal", contents: [{ type: "text", text: "คงเหลือ", size: "xs", color: "#64748b", flex: 2 }, { type: "text", text: `${statRemain} วัน`, size: "xs", color: (statRemain > 0 ? "#10b981" : "#ef4444"), align: "end", flex: 1, weight: "bold" }]}
          ]
      });

      bodyContents.push({ type: "separator", color: "#e5e7eb", margin: "lg" });
      bodyContents.push({ type: "text", text: timeFooterText, size: "xxs", color: "#94a3b8", margin: "md", wrap: true, align: "center" });

      const flexMsg = {
        type: "flex", 
        altText: `[${eventName}] สรุปการลางาน: ${data.empName} (${data.status})`,
        contents: {
          type: "bubble", size: "mega",
          header: { type: "box", layout: "vertical", backgroundColor: hc, contents: [{ type: "text", text: eventName, color: "#ffffff", size: "xs", weight: "bold" }, { type: "text", text: data.status, weight: "bold", color: "#ffffff", size: "xl", margin: "sm" }] },
          body: { type: "box", layout: "vertical", contents: bodyContents },
          footer: { type: "box", layout: "vertical", spacing: "sm", contents: [{ type: "button", style: "primary", color: "#0f172a", height: "sm", action: { type: "uri", label: "เข้าสู่ระบบเพื่อตรวจสอบ", uri: data.appUrl || GAS_API_URL } }] }
        }
      };

      if (liff.isApiAvailable("shareTargetPicker")) {
        try {
          const res = await liff.shareTargetPicker([flexMsg]);
          if (res) {
             statusText.innerText = "🚀 แชร์ข้อมูลสำเร็จเรียบร้อยแล้ว!";
             statusText.style.color = "#10b981";
          } else {
             statusText.innerText = "คุณได้ยกเลิกการแชร์ข้อความ";
             statusText.style.color = "#94a3b8";
          }
          progressBar.style.display = 'none';
          document.querySelector('.progress-container').style.display = 'none';
          percentText.style.display = 'none';
          
          setTimeout(() => liff.closeWindow(), 1800);
        } catch (err) { 
          showError("เกิดข้อผิดพลาดขณะส่งข้อความแชร์: " + err); 
        }
      } else {
        showError("ฟังก์ชันแชร์ไม่พร้อมใช้งานบนหน้าจอนี้ (โปรดเปิดใช้งานผ่านสมาร์ตโฟน)");
      }
    }

    function showError(msg) {
      progressBar.style.display = 'none';
      document.querySelector('.progress-container').style.display = 'none';
      statusText.innerText = msg;
      statusText.style.color = '#ef4444';
    }

    main();
  </script>
</body>
</html>
